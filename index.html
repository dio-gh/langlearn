<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0d0f0e">
  <title>go{} dojo</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div class="brand">
        <button class="mark" id="map-button" type="button" aria-label="Open course map">
          <span>go</span><span aria-hidden="true">{}</span>
        </button>
        <span
          class="language-version"
          id="language-version"
          title="Generated and validated with Go 1.26.4"
        >go1.26.4</span>
      </div>
      <nav class="track-switch" id="track-switch" aria-label="Practice tracks"></nav>
      <div class="actions">
        <button class="icon-button" id="sound-button" type="button" aria-label="Toggle sound" aria-pressed="true">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M5 10v4h3l4 3V7L8 10H5zM16 9c1.5 1.6 1.5 4.4 0 6M18.5 6.5c3.3 3.1 3.3 7.9 0 11"/>
            <path class="sound-slash" d="M4 4l16 16"/>
          </svg>
        </button>
        <button class="icon-button" id="reset-button" type="button" aria-label="Reset current exercise" title="Reset">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M4 4v6h6M5.5 15a7 7 0 1 0 .6-7.5L4 10"/>
          </svg>
        </button>
      </div>
    </header>

    <section class="practice" aria-labelledby="stage-label">
      <div class="progress" id="progress" aria-label="Course progress"></div>
      <div class="stage-meta">
        <div>
          <span id="stage-glyph" class="stage-glyph" aria-hidden="true">{}</span>
          <span id="stage-label" class="sr-only">Go exercise</span>
        </div>
        <span id="counter" class="counter">1 · 3</span>
      </div>
      <code id="grammar-rule" class="grammar-rule"></code>

      <div class="code-frame" id="code-frame">
        <pre id="code" aria-live="polite"></pre>
        <textarea
          id="capture"
          aria-label="Type the shown Go code"
          autocapitalize="off"
          autocomplete="off"
          autocorrect="off"
          spellcheck="false"
        ></textarea>
      </div>
      <div class="answers" id="answers" hidden></div>

      <div class="stats" aria-label="Current result">
        <span><b id="speed">0</b><small aria-label="speed or attempts">↯</small></span>
        <span><b id="accuracy">100</b><small aria-label="accuracy percent">%</small></span>
        <span><b id="streak">0</b><small aria-label="streak">◆</small></span>
      </div>
    </section>

    <div class="hint" aria-hidden="true">
      <kbd>tab</kbd><span>⇥</span>
      <kbd>esc</kbd><span>↺</span>
    </div>
  </main>

  <dialog id="course-map" class="course-map">
    <form method="dialog" class="map-head">
      <span class="mark"><span>go</span><span id="map-track" aria-hidden="true">{}</span></span>
      <button class="icon-button" aria-label="Close course map" value="close">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 5l14 14M19 5L5 19"/></svg>
      </button>
    </form>
    <div id="map-grid" class="map-grid"></div>
  </dialog>

  <div class="sr-only" id="live-status" aria-live="assertive"></div>
  <script type="module" src="./src/app.js"></script>
</body>
</html>
