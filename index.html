<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#f4f2ec">
  <title>langlearn</title>
  <link rel="icon" href="./assets/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div class="brand">
        <button class="brand-button" id="map-button" type="button" aria-label="Open course map">langlearn</button>
        <span
          class="course-badge"
          id="course-badge"
          title="Go course validated with go1.26.4"
        >Go 1.26.4</span>
      </div>
      <nav class="mode-switch" id="mode-switch" aria-label="Practice modes"></nav>
      <div class="actions">
        <label>
          <span class="sr-only">Color theme</span>
          <select class="theme-select" id="theme-select" aria-label="Color theme">
            <option value="auto">Auto</option>
            <option value="light">Light</option>
            <option value="dark">Dark</option>
          </select>
        </label>
        <button class="icon-button" id="reset-button" type="button" aria-label="Reset current exercise" title="Reset">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M4 4v6h6M5.5 15a7 7 0 1 0 .6-7.5L4 10"/>
          </svg>
        </button>
      </div>
    </header>

    <section class="practice" aria-labelledby="stage-label">
      <div class="progress" id="progress" aria-label="Course progress"></div>
      <div class="stage-meta">
        <div>
          <span id="stage-glyph" class="stage-glyph" aria-hidden="true">{}</span>
          <span id="stage-label" class="sr-only">Programming exercise</span>
        </div>
        <span id="counter" class="counter">0%</span>
      </div>
      <code id="grammar-rule" class="grammar-rule"></code>

      <div class="code-frame" id="code-frame">
        <pre id="code" aria-live="polite"></pre>
        <textarea
          id="capture"
          aria-label="Type the shown code"
          autocapitalize="off"
          autocomplete="off"
          autocorrect="off"
          spellcheck="false"
        ></textarea>
      </div>
      <div class="answers" id="answers" hidden></div>

      <div class="telemetry" aria-label="Practice timing and result">
        <span class="metric"><b id="exercise-time">0:00</b><small>exercise</small></span>
        <span class="metric"><b id="session-time">0:00</b><small id="session-time-label">session</small></span>
        <span class="metric"><b id="remaining-time">~0:00</b><small>stage left</small></span>
        <span class="metric"><b id="speed">0</b><small id="speed-label">tries</small></span>
        <span class="metric"><b id="accuracy">--</b><small>accuracy %</small></span>
        <span class="metric"><b id="streak">0</b><small>streak</small></span>
      </div>
    </section>

    <div class="hint" aria-hidden="true">
      <kbd>tab</kbd><span>-&gt;</span>
      <kbd>esc</kbd><span>reset</span>
    </div>
  </main>

  <dialog id="course-map" class="course-map">
    <form method="dialog" class="map-head">
      <div class="map-title">
        <strong id="map-language">Go</strong>
        <span id="map-mode">Syntax</span>
        <select class="language-select" id="language-select" aria-label="Language course" hidden></select>
      </div>
      <button class="icon-button" aria-label="Close course map" value="close">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 5l14 14M19 5L5 19"/></svg>
      </button>
    </form>
    <div id="map-grid" class="map-grid"></div>
  </dialog>

  <div class="sr-only" id="live-status" aria-live="assertive"></div>
  <script type="module" src="./src/app.js"></script>
</body>
</html>
